<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Sale â PeacePlanet POS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; background:linear-gradient(180deg,#f5f5f7 0%,#eef1f8 100%); min-height:100vh; color:#1c1c1e; -webkit-font-smoothing:antialiased; letter-spacing:-0.015em; padding:24px; }
  body::before { content:''; position:fixed; top:-200px; right:-200px; width:600px; height:600px; background:radial-gradient(circle,rgba(175,82,222,0.18) 0%,transparent 70%); pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; bottom:-200px; left:-200px; width:600px; height:600px; background:radial-gradient(circle,rgba(0,199,190,0.15) 0%,transparent 70%); pointer-events:none; z-index:0; }
  .wrap { max-width:1100px; margin:0 auto; position:relative; z-index:1; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  h1 { font-size:28px; font-weight:800; letter-spacing:-0.035em; background:linear-gradient(135deg,#1c1c1e 0%,#5e5ce6 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .back { color:#007aff; text-decoration:none; font-weight:600; font-size:14px; }
  .card { background:rgba(255,255,255,0.85); backdrop-filter:blur(20px); border-radius:16px; padding:24px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.06); border:1px solid rgba(0,0,0,0.04); }
  .meta-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:8px; }
  .meta-item { }
  .meta-label { font-size:11px; font-weight:600; text-transform:uppercase; color:#8e8e93; letter-spacing:0.05em; margin-bottom:4px; }
  .meta-value { font-size:15px; font-weight:600; color:#1c1c1e; }
  table { width:100%; border-collapse:separate; border-spacing:0; }
  th { text-align:left; padding:12px; font-size:11px; font-weight:700; text-transform:uppercase; color:#8e8e93; letter-spacing:0.05em; border-bottom:1px solid #e8e8ed; }
  td { padding:12px; font-size:14px; border-bottom:1px solid rgba(0,0,0,0.04); vertical-align:middle; }
  tr.refunded td { opacity:0.5; text-decoration:line-through; }
  input.inline { width:90px; padding:6px 10px; border:1px solid #d2d2d7; border-radius:8px; font-family:inherit; font-size:13px; text-align:right; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
  .btn-primary { background:linear-gradient(135deg,#007aff 0%,#5e5ce6 100%); color:white; box-shadow:0 4px 14px rgba(0,122,255,0.35); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,122,255,0.45); }
  .btn-danger { background:linear-gradient(135deg,#ff3b30 0%,#ff2d55 100%); color:white; box-shadow:0 4px 14px rgba(255,59,48,0.3); }
  .btn-danger:hover { transform:translateY(-1px); }
  .btn-sm { padding:5px 10px; font-size:11px; }
  .btn-ghost { background:rgba(142,142,147,0.12); color:#48484a; }
  .totals { display:flex; justify-content:flex-end; gap:40px; padding:16px 12px; font-size:15px; }
  .totals .lbl { color:#8e8e93; }
  .totals .val { font-weight:700; color:#1c1c1e; min-width:80px; text-align:right; }
  .total-row .val { font-size:22px; background:linear-gradient(135deg,#007aff 0%,#5e5ce6 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .add-row { display:grid; grid-template-columns:2fr 80px 120px auto; gap:8px; margin-top:12px; padding:12px; background:rgba(255,255,255,0.5); border-radius:12px; }
  .add-row input { padding:8px 12px; border:1px solid #d2d2d7; border-radius:8px; font-family:inherit; font-size:14px; }
  .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:12px; background:rgba(28,28,30,0.95); color:white; font-size:14px; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,0.2); opacity:0; transform:translateY(20px); transition:all 0.3s; z-index:1000; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.error { background:linear-gradient(135deg,#ff3b30 0%,#ff2d55 100%); }
  .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; letter-spacing:0.02em; }
  .badge-refunded { background:rgba(255,59,48,0.15); color:#c0291f; }
  .actions { display:flex; gap:16px; margin-top:20px; padding-top:20px; border-top:1px solid #e8e8ed; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Edit Sale</h1>
    <a class="back" href="/" id="backLink"><i class="fa fa-arrow-left"></i> Back to POS</a>
  </div>
  <div id="content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('pp_token');
const saleId = new URLSearchParams(location.search).get('id');
let sale = null;

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(()=>t.className='toast', 2200);
}

async function api(path, opts={}) {
  const r = await fetch('/api' + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{}) }
  });
  if (!r.ok) {
    let msg = 'Error'; try { msg = (await r.json()).error || msg; } catch(_){}
    throw new Error(msg);
  }
  return r.json();
}

function money(n) { return 'Â£' + (Number(n)||0).toFixed(2); }

async function load() {
  if (!token) { location.href = '/'; return; }
  if (!saleId) { document.getElementById('content').innerHTML = '<div class="card">No sale id</div>'; return; }
  try {
    sale = await api('/sales/' + saleId);
    render();
  } catch (e) { showToast(e.message, true); }
}

function render() {
  const c = document.getElementById('content');
  const status = sale.payment_status || 'paid';
  c.innerHTML = `
    <div class="card">
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Receipt</div><div class="meta-value">${sale.receipt_number}</div></div>
        <div class="meta-item"><div class="meta-label">Date</div><div class="meta-value">${new Date(sale.created_at).toLocaleString('en-GB')}</div></div>
        <div class="meta-item"><div class="meta-label">Store</div><div class="meta-value">${sale.store_name||''}</div></div>
        <div class="meta-item"><div class="meta-label">Cashier</div><div class="meta-value">${sale.cashier_name||''}</div></div>
        <div class="meta-item"><div class="meta-label">Customer</div><div class="meta-value">${(sale.customer_name||'').trim() || 'Walk-in'}</div></div>
        <div class="meta-item"><div class="meta-label">Payment</div><div class="meta-value">${sale.payment_method||''}</div></div>
        <div class="meta-item"><div class="meta-label">Status</div><div class="meta-value">${status === 'refunded' ? '<span class="badge badge-refunded">Refunded</span>' : status}</div></div>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr><th>Product</th><th>SKU</th><th style="width:80px">Qty</th><th style="width:110px">Unit Â£</th><th style="width:90px">Disc Â£</th><th style="width:90px">Total</th><th style="width:170px"></th></tr>
        </thead>
        <tbody>
          ${sale.items.map(it => `
            <tr class="${it.refunded?'refunded':''}" data-id="${it.id}">
              <td>${it.product_name||''}${it.refunded?' <span class="badge badge-refunded">Refunded</span>':''}</td>
              <td style="color:#8e8e93;font-size:12px">${it.sku||''}</td>
              <td><input class="inline" type="number" min="1" value="${it.quantity}" data-f="quantity" ${it.refunded?'disabled':''}></td>
              <td><input class="inline" type="number" step="0.01" value="${Number(it.unit_price).toFixed(2)}" data-f="unit_price" ${it.refunded?'disabled':''}></td>
              <td><input class="inline" type="number" step="0.01" value="${Number(it.discount||0).toFixed(2)}" data-f="discount" ${it.refunded?'disabled':''}></td>
              <td><strong>${money(it.total)}</strong></td>
              <td>
                ${it.refunded ? '' : `
                  <button class="btn btn-primary btn-sm" onclick="saveLine('${it.id}')"><i class="fa fa-save"></i></button>
                  <button class="btn btn-danger btn-sm" onclick="refundLine('${it.id}')"><i class="fa fa-undo"></i> Refund</button>
                  <button class="btn btn-ghost btn-sm" onclick="deleteLine('${it.id}')" title="Remove"><i class="fa fa-times"></i></button>
                `}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>

      <div class="add-row">
        <input placeholder="Scan SKU or barcodeâ¦" id="addSku">
        <input type="number" min="1" value="1" id="addQty">
        <input type="number" step="0.01" placeholder="Price (optional)" id="addPrice">
        <button class="btn btn-primary" onclick="addItem()"><i class="fa fa-plus"></i> Add item</button>
      </div>

      <div class="totals"><span class="lbl">Subtotal</span><span class="val">${money(sale.subtotal)}</span></div>
      <div class="totals"><span class="lbl">Discount</span><span class="val">${money(sale.discount_amount)}</span></div>
      <div class="totals"><span class="lbl">Tax</span><span class="val">${money(sale.tax_amount)}</span></div>
      <div class="totals total-row"><span class="lbl">Total</span><span class="val">${money(sale.total)}</span></div>

      <div class="actions">
        ${status !== 'refunded' ? `<button class="btn btn-danger" onclick="refundAll()"><i class="fa fa-ban"></i> Refund whole sale</button>` : ''}
        <button class="btn btn-primary" onclick="window.print()"><i class="fa fa-print"></i> Print receipt</button>
      </div>
    </div>
  `;

  // Enter on add-sku adds item
  document.getElementById('addSku').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });
}

async function saveLine(itemId) {
  const row = document.querySelector(`tr[data-id="${itemId}"]`);
  const body = {};
  row.querySelectorAll('input[data-f]').forEach(i => body[i.dataset.f] = i.value);
  try {
    await api(`/sales/${saleId}/items/${itemId}`, { method:'PATCH', body: JSON.stringify(body) });
    showToast('Saved');
    await load();
  } catch (e) { showToast(e.message, true); }
}

async function refundLine(itemId) {
  if (!confirm('Refund this line and put it back in stock?')) return;
  try {
    await api(`/sales/${saleId}/items/${itemId}/refund`, { method:'POST' });
    showToast('Refunded');
    await load();
  } catch (e) { showToast(e.message, true); }
}

async function deleteLine(itemId) {
  if (!confirm('Remove this item and return to stock?')) return;
  try {
    await api(`/sales/${saleId}/items/${itemId}`, { method:'DELETE' });
    showToast('Removed');
    await load();
  } catch (e) { showToast(e.message, true); }
}

async function addItem() {
  const sku = document.getElementById('addSku').value.trim();
  const qty = document.getElementById('addQty').value || 1;
  const price = document.getElementById('addPrice').value;
  if (!sku) return showToast('Scan a SKU first', true);
  try {
    const body = { sku, quantity: qty };
    if (price) body.unit_price = price;
    await api(`/sales/${saleId}/items`, { method:'POST', body: JSON.stringify(body) });
    showToast('Added');
    await load();
  } catch (e) { showToast(e.message, true); }
}

async function refundAll() {
  if (!confirm('Refund the entire sale? All items will go back into stock.')) return;
  try {
    await api(`/sales/${saleId}/refund`, { method:'POST' });
    showToast('Whole sale refunded');
    await load();
  } catch (e) { showToast(e.message, true); }
}

load();
</script>
</body>
</html>
