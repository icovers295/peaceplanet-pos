    // Reports Page
    function ReportsPage({ currentStore, stores, user, showToast }) {
      const [loading, setLoading] = useState(false);
      const [stats, setStats] = useState(null);
      const [dateFrom, setDateFrom] = useState(new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0]);
      const [dateTo, setDateTo] = useState(new Date().toISOString().split('T')[0]);

      useEffect(() => {
        loadReport();
      }, [dateFrom, dateTo, currentStore]);

      const loadReport = async () => {
        setLoading(true);
        try {
          const result = await api(`/sales/reports/summary?store_id=${currentStore}&date_from=${dateFrom}&date_to=${dateTo}`);
          setStats(result);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setLoading(false);
        }
      };

      return el('div', { className: 'page-content' },
        el('h1', { style: { marginBottom: 24 } }, 'Reports'),
        el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 } },
          el('div', { className: 'form-group' },
            el('label', null, 'From'),
            el('input', { type: 'date', value: dateFrom, onChange: e => setDateFrom(e.target.value) })
          ),
          el('div', { className: 'form-group' },
            el('label', null, 'To'),
            el('input', { type: 'date', value: dateTo, onChange: e => setDateTo(e.target.value) })
          )
        ),
        loading ? el('div', null, 'Loading...') : stats && el('div', null,
          el('div', { className: 'stat-cards' },
            el('div', { className: 'stat-card' },
              el('div', { className: 'stat-label' }, 'Total Revenue'),
              el('div', { className: 'stat-value' }, `£${(stats.total_revenue || 0).toFixed(2)}`)
            ),
            el('div', { className: 'stat-card' },
              el('div', { className: 'stat-label' }, 'Transactions'),
              el('div', { className: 'stat-value' }, stats.total_transactions || 0)
            ),
            el('div', { className: 'stat-card' },
              el('div', { className: 'stat-label' }, 'Avg Transaction'),
              el('div', { className: 'stat-value' }, `£${(stats.total_revenue / (stats.total_transactions || 1)).toFixed(2)}`)
            ),
            el('div', { className: 'stat-card' },
              el('div', { className: 'stat-label' }, 'Payment Methods'),
              el('div', { className: 'text-sm' },
                el('div', null, `Cash: £${(stats.cash_total || 0).toFixed(2)}`),
                el('div', null, `Card: £${(stats.card_total || 0).toFixed(2)}`)
              )
            )
          )
        )
      );
    }

    // Staff Page
    function StaffPage({ showToast }) {
      const [staff, setStaff] = useState([]);
      const [loading, setLoading] = useState(false);
      const [showForm, setShowForm] = useState(false);
      const [formData, setFormData] = useState({ first_name: '', last_name: '', email: '', password: '', role: 'cashier', is_active: true });

      useEffect(() => {
        loadStaff();
      }, []);

      const loadStaff = async () => {
        setLoading(true);
        try {
          const result = await api('/auth/users');
          setStaff(result || []);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setLoading(false);
        }
      };

      const handleCreateStaff = async () => {
        try {
          await api('/auth/users', {
            method: 'POST',
            body: JSON.stringify(formData)
          });
          showToast('Staff member added', 'success');
          setShowForm(false);
          setFormData({ first_name: '', last_name: '', email: '', password: '', role: 'cashier', is_active: true });
          loadStaff();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      return el('div', { className: 'page-content' },
        el('div', { className: 'flex-between', style: { marginBottom: 24 } },
          el('h1', null, 'Staff'),
          el('button', { className: 'btn btn-primary', onClick: () => setShowForm(true) }, '+ Add Staff')
        ),
        loading ? el('div', null, 'Loading...') :
          el('table', { className: 'table' },
            el('thead', null,
              el('tr', null,
                el('th', null, 'Name'),
                el('th', null, 'Email'),
                el('th', null, 'Role'),
                el('th', null, 'Status')
              )
            ),
            el('tbody', null,
              staff.map(s =>
                el('tr', { key: s.id },
                  el('td', null, `${s.first_name} ${s.last_name}`),
                  el('td', null, s.email),
                  el('td', null, el('span', { className: 'badge badge-primary' }, s.role)),
                  el('td', null, el('span', { className: `badge ${s.is_active ? 'badge-success' : 'badge-danger'}` }, s.is_active ? 'Active' : 'Inactive'))
                )
              )
            )
          ),
        showForm && el('div', { className: 'modal-overlay', onClick: e => { if (e.target === e.currentTarget) setShowForm(false); } },
          el('div', { className: 'modal-card' },
            el('div', { className: 'modal-header' },
              el('h2', null, 'Add Staff Member'),
              el('button', { className: 'modal-close', onClick: () => setShowForm(false) }, '×')
            ),
            el('div', { className: 'form-group' },
              el('label', null, 'First Name'),
              el('input', {
                type: 'text',
                value: formData.first_name,
                onChange: e => setFormData({ ...formData, first_name: e.target.value })
              })
            ),
            el('div', { className: 'form-group' },
              el('label', null, 'Last Name'),
              el('input', {
                type: 'text',
                value: formData.last_name,
                onChange: e => setFormData({ ...formData, last_name: e.target.value })
              })
            ),
            el('div', { className: 'form-group' },
              el('label', null, 'Email'),
              el('input', {
                type: 'email',
                value: formData.email,
                onChange: e => setFormData({ ...formData, email: e.target.value })
              })
            ),
            el('div', { className: 'form-group' },
              el('label', null, 'Password'),
              el('input', {
                type: 'password',
                value: formData.password,
                onChange: e => setFormData({ ...formData, password: e.target.value })
              })
            ),
            el('div', { className: 'form-group' },
              el('label', null, 'Role'),
              el('select', {
                value: formData.role,
                onChange: e => setFormData({ ...formData, role: e.target.value })
              },
                el('option', { value: 'admin' }, 'Admin'),
                el('option', { value: 'manager' }, 'Manager'),
                el('option', { value: 'cashier' }, 'Cashier')
              )
            ),
            el('div', { style: { display: 'flex', gap: 12 } },
              el('button', { className: 'btn btn-success', onClick: handleCreateStaff }, 'Add'),
              el('button', { className: 'btn btn-secondary', onClick: () => setShowForm(false) }, 'Cancel')
            )
          )
        )
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(el(App));
  </script>
</body>
</html>
